services:
  - type: web
    name: enterprise-rag-assistant
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPEN_AI_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
